<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zevora — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0d;--s1:#111116;--s2:#18181d;--s3:#1e1e24;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --fg:#ececf0;--fg2:#8888a0;--fg3:#404055;
  --accent:#2bba8f;--accent2:#1d9e76;
  --red:#f85149;--redg:rgba(248,81,73,0.1);
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(43,186,143,0.06),transparent 55%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;}

.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;position:relative;z-index:1;}
.mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;box-shadow:0 0 24px rgba(43,186,143,0.3);}
.bname{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--fg);letter-spacing:-.01em;}

.card{width:100%;max-width:400px;background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:36px;position:relative;z-index:1;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6;}

h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:5px;}
.sub{font-size:13px;color:var(--fg2);margin-bottom:28px;line-height:1.5;}

.fl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg3);margin-bottom:7px;margin-top:14px;}
.fl:first-of-type{margin-top:0;}
.fw{background:var(--s2);border:1px solid var(--border);border-radius:10px;transition:border-color .15s;}
.fw:focus-within{border-color:var(--accent);}
.fw input{width:100%;background:transparent;border:none;outline:none;padding:12px 14px;font-size:14px;color:var(--fg);font-family:'DM Mono',monospace;}
.fw input::placeholder{color:var(--fg3);}

.err{background:var(--redg);border:1px solid rgba(248,81,73,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;margin-top:4px;}

.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;font-family:'DM Sans',sans-serif;margin-top:22px;box-shadow:0 0 20px rgba(43,186,143,0.25);}
.btn:hover{background:var(--accent2);}

.note{font-size:11px;color:var(--fg3);text-align:center;margin-top:20px;line-height:1.7;}
.note a{color:var(--fg2);text-decoration:none;}
.note a:hover{color:var(--fg);}

.dots{display:flex;gap:6px;justify-content:center;margin-bottom:32px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);}
.dot:nth-child(2){background:var(--accent);opacity:.5;}
</style>
</head>
<body>

<div class="brand">
  <div class="mark">Z</div>
  <span class="bname">Zevora</span>
</div>

<div class="card">
  <h1>Sign in</h1>
  <p class="sub">Agent &amp; admin access only. Unauthorized access is prohibited.</p>

  {% if error %}<div class="err">{{ error }}</div>{% endif %}

  <form method="POST" action="/auth/login">
    <div class="fl">Username</div>
    <div class="fw"><input name="username" type="text" placeholder="username" autocomplete="off" required></div>
    <div class="fl">Password</div>
    <div class="fw"><input name="password" type="password" placeholder="••••••••" required></div>
    <button class="btn" type="submit">Sign in &rarr;</button>
  </form>

  <div class="note">
    Zevora Forensic Scanner &nbsp;·&nbsp; Authorized personnel only<br>
    <a href="/privacy">Privacy Policy</a> &nbsp;·&nbsp; <a href="/terms">Terms of Service</a>
  </div>
</div>

</body>
</html>
