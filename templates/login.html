<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comet — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b10;--s:#0f1420;--s2:#131925;--s3:#1a2235;--b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);--fg:#f0f4ff;--fg2:#8892a4;--fg3:#3d4a5c;--green:#00f5a0;--gd:#00c97a;--red:#ff4d6d;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(0,245,160,0.04) 0%,transparent 50%);pointer-events:none;}
.card{width:400px;background:var(--s);border:1px solid var(--b2);border-radius:20px;padding:40px;position:relative;z-index:1;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--gd));display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#000;}
.brand{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--fg3);margin-top:1px;}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:6px;}
.sub{font-size:13px;color:var(--fg2);margin-bottom:28px;}
.fl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg3);margin-bottom:6px;}
.fw{background:var(--s2);border:1px solid var(--b);border-radius:10px;margin-bottom:14px;transition:border-color .15s;}
.fw:focus-within{border-color:rgba(0,245,160,0.35);}
.fw input{width:100%;background:transparent;border:none;outline:none;padding:12px 14px;font-size:14px;color:var(--fg);font-family:'DM Mono',monospace;}
.fw input::placeholder{color:var(--fg3);}
.err{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;}
.btn{width:100%;background:var(--green);color:#000;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--gd);}
.note{font-size:11px;color:var(--fg3);text-align:center;margin-top:20px;line-height:1.6;}
.note a{color:var(--fg2);text-decoration:none;}
.note a:hover{color:var(--fg);}
.corner{position:absolute;}
.tl{top:16px;left:16px;width:20px;height:20px;border-top:1.5px solid var(--green);border-left:1.5px solid var(--green);}
.br{bottom:16px;right:16px;width:20px;height:20px;border-bottom:1.5px solid var(--fg3);border-right:1.5px solid var(--fg3);}
</style>
</head>
<body>
<div class="card">
  <div class="corner tl"></div>
  <div class="corner br"></div>
  <div class="logo">
    <div class="mark">C</div>
    <div><div class="brand">Comet</div><div class="brand-sub">Forensic Portal</div></div>
  </div>
  <h1>Sign In</h1>
  <p class="sub">Enter your credentials to access the portal.</p>
  {% if error %}<div class="err">✗ &nbsp;{{ error }}</div>{% endif %}
  <form method="POST" action="/auth/login">
    <div class="fl">Username</div>
    <div class="fw"><input type="text" name="username" placeholder="your username" autocomplete="username" autofocus></div>
    <div class="fl">Password</div>
    <div class="fw"><input type="password" name="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button type="submit" class="btn">Sign In  →</button>
  </form>
  <div class="note">No account? Contact <strong>converts_19942</strong> on Discord.<br><a href="/privacy">Privacy</a> &nbsp;·&nbsp; <a href="/terms">Terms</a></div>
</div>
</body>
</html>
